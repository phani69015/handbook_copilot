# Handbook Copilot - Docker Compose
# Uses explicit named volumes and networks for full decoupling

services:
  # ─── Vector Database ───────────────────────────────────────
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: handbook-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    networks:
      - handbook-backend
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # ─── Local LLM Server ─────────────────────────────────────
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: handbook-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - handbook-backend
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: handbook-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:z
    networks:
      - handbook-backend
      - handbook-frontend
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; print(httpx.get('http://localhost:8000/health').status_code)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Frontend UI ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: handbook-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    networks:
      - handbook-frontend
    environment:
      - BACKEND_URL=http://backend:8000
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    depends_on:
      backend:
        condition: service_healthy

# ─── Named Volumes (Podman-safe, decoupled) ────────────────
volumes:
  qdrant_storage:
    name: handbook_qdrant_storage
  qdrant_snapshots:
    name: handbook_qdrant_snapshots
  ollama_models:
    name: handbook_ollama_models

# ─── Networks (isolated communication) ─────────────────────
networks:
  handbook-backend:
    name: handbook-backend
    driver: bridge
  handbook-frontend:
    name: handbook-frontend
    driver: bridge
